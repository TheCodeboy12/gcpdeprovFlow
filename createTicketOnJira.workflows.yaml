main:
  params: [args] # Accepts input arguments like {"userKey": "user@example.com"}
  steps:
    - init:
        assign:
          - data: ${json.decode(base64.decode(args.data.message.data))}
    - postToJira:
        call: http.post
        args:
          url: "https://api-private.atlassian.com/automation/webhooks/jira/a/8b035a00-a94a-417f-b450-1b2f08a6a6de/0190dfe6-e3f7-7767-9e23-9c11fc430f24"
          headers:
            X-Automation-Webhook-Token: "9a50776204b3c46f733ae6602e2635b4024f91e0"
          body: '${data}'
        result: postToJiraRes
    - ret:
        return: '${postToJiraRes}'
