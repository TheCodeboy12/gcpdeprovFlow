main:
  params: [args]  # Accept a single argument named 'args'
  steps:
    - init:
        assign:
          - projectId: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - secretId: ${args.secretName}  # Access secretName from args
          - version: ${args.version}      # Access version from args
    - access_string_secret:
        call: googleapis.secretmanager.v1.projects.secrets.versions.accessString
        args:
          secret_id: ${secretId}
          version: ${version} 
          project_id: ${projectId}
        result: str_secret
    - access_secret:  # This step can be removed if not needed
        call: googleapis.secretmanager.v1.projects.secrets.versions.access
        args:
          name: ${"projects/" + projectId + "/secrets/" + secretId + "/versions/" + string(version)}
        result: base64_encoded_secret
    - finish:
        return: ${str_secret}  # This correctly returns the secret string
